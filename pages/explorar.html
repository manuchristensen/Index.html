<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChambaYa — Explorar tareas</title>
<link rel="stylesheet" href="../fonts.css">
<link rel="stylesheet" href="../styles.css">
<!-- Leaflet para el mapa -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ══ LAYOUT ══ */
* { box-sizing: border-box; }
.exp-wrap {
  display: grid;
  grid-template-columns: 400px 1fr;
  height: calc(100vh - 66px);
  overflow: hidden;
}

/* ══ BARRA FILTROS ══ */
.exp-filtros {
  background: var(--blanco);
  border-bottom: 1.5px solid var(--borde);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  grid-column: 1 / -1;
  position: sticky;
  top: 66px;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.exp-search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 280px;
}
.exp-search-ico {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--suave);
  font-size: .9rem;
}
.exp-search {
  width: 100%;
  background: var(--fondo);
  border: 1.5px solid var(--borde);
  border-radius: var(--radio-pill);
  padding: 9px 12px 9px 34px;
  font-family: 'Nunito', sans-serif;
  font-size: .85rem;
  font-weight: 700;
  color: var(--texto);
  outline: none;
  transition: border-color .2s;
}
.exp-search:focus { border-color: var(--verde); background: var(--blanco); }
.exp-search::placeholder { color: #CBD5E1; }

.filtro-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1.5px solid var(--borde);
  border-radius: var(--radio-pill);
  background: var(--blanco);
  font-family: 'Nunito', sans-serif;
  font-size: .82rem;
  font-weight: 800;
  color: var(--suave);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.filtro-btn:hover { border-color: var(--verde); color: var(--verde-o); background: var(--verde-c); }
.filtro-btn.activo { border-color: var(--verde); color: var(--verde-o); background: var(--verde-c); }
.filtro-btn .arrow { font-size: .65rem; }

/* ══ LISTA IZQUIERDA ══ */
.exp-lista-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  border-right: 1.5px solid var(--borde);
  background: var(--fondo);
}

/* Notificación de nuevas tareas */
.nuevas-burbuja {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--verde);
  color: #fff;
  font-size: .82rem;
  font-weight: 900;
  padding: 10px 20px;
  cursor: pointer;
  transition: background .2s;
  animation: slideDown .3s ease;
}
.nuevas-burbuja.show { display: flex; }
.nuevas-burbuja:hover { background: var(--verde-o); }
@keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.exp-lista-header {
  padding: 14px 16px 10px;
  background: var(--blanco);
  border-bottom: 1.5px solid var(--borde);
  flex-shrink: 0;
}
.exp-lista-titulo {
  font-size: .75rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--suave);
}
.exp-lista-sub {
  font-size: .82rem;
  font-weight: 800;
  color: var(--texto);
  margin-top: 2px;
}

.exp-lista {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.exp-lista::-webkit-scrollbar { width: 4px; }
.exp-lista::-webkit-scrollbar-thumb { background: var(--borde); border-radius: 4px; }

/* Card de tarea en lista */
.exp-card {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  border: 1.5px solid var(--borde);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
}
.exp-card:hover { border-color: var(--verde); box-shadow: var(--sombra); transform: translateY(-1px); }
.exp-card.activa-hover { border-color: var(--verde); box-shadow: 0 0 0 3px rgba(0,201,107,.15); }

.exp-card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}
.exp-card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.exp-card-info { flex: 1; min-width: 0; }
.exp-card-titulo {
  font-size: .92rem;
  font-weight: 900;
  color: var(--texto);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.exp-card-precio {
  font-size: .9rem;
  font-weight: 900;
  color: var(--verde-o);
}
.exp-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.exp-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: .75rem;
  font-weight: 800;
  color: var(--suave);
}
.exp-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--fondo);
  border: 1px solid var(--borde);
  border-radius: var(--radio-pill);
  padding: 3px 9px;
  font-size: .72rem;
  font-weight: 800;
  color: var(--suave);
}
.exp-badge.hay-ofertas { background: var(--verde-c); border-color: var(--verde); color: var(--verde-o); }
.exp-nueva-tag {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--naranja);
  color: #fff;
  font-size: .65rem;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: var(--radio-pill);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* Empty state */
.exp-empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--suave);
}
.exp-empty-ico { font-size: 2.5rem; margin-bottom: 12px; }
.exp-empty-txt { font-size: .9rem; font-weight: 800; }

/* Skeleton */
.skel-card {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  padding: 16px;
  display: flex;
  gap: 12px;
}
.sk {
  background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ══ MAPA ══ */
.exp-mapa {
  position: relative;
  height: 100%;
}
#mapa {
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Botón mi ubicación */
.btn-mi-ubicacion {
  position: absolute;
  bottom: 24px;
  right: 14px;
  z-index: 10;
  background: var(--blanco);
  border: 1.5px solid var(--borde);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  box-shadow: var(--sombra);
  transition: all .2s;
}
.btn-mi-ubicacion:hover { border-color: var(--verde); background: var(--verde-c); }

/* Popup del mapa */
.leaflet-popup-content-wrapper {
  border-radius: 12px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,.15) !important;
  border: 1.5px solid var(--borde);
}
.mapa-popup { padding: 4px; min-width: 200px; }
.mapa-popup-titulo { font-size: .9rem; font-weight: 900; color: var(--texto); margin-bottom: 6px; font-family: 'Nunito', sans-serif; }
.mapa-popup-precio { font-size: .85rem; font-weight: 900; color: var(--verde-o); margin-bottom: 8px; font-family: 'Nunito', sans-serif; }
.mapa-popup-btn {
  display: block;
  background: var(--verde);
  color: #fff;
  text-align: center;
  padding: 8px;
  border-radius: 8px;
  text-decoration: none;
  font-size: .8rem;
  font-weight: 900;
  font-family: 'Nunito', sans-serif;
  transition: background .2s;
}
.mapa-popup-btn:hover { background: var(--verde-o); }

/* Responsive */
@media (max-width: 820px) {
  .exp-wrap { grid-template-columns: 1fr; }
  .exp-lista-wrap { height: 50vh; }
  .exp-mapa { height: 50vh; }
}
</style>
</head>
<body>

<nav class="nav">

<!-- FILTROS -->
<div class="exp-filtros">

</div>

<!-- LAYOUT PRINCIPAL -->
<div class="exp-wrap">

  <!-- LISTA IZQUIERDA -->
  <div class="exp-lista-wrap">
    <!-- Burbuja nuevas tareas -->
    <div class="nuevas-burbuja" id="nuevas-burbuja" onclick="cargarNuevas()">
      <span id="nuevas-txt">↑ 3 tareas nuevas</span>

    </div>

    <div class="exp-lista-header">
      <div class="exp-lista-titulo">Tareas disponibles</div>
      <div class="exp-lista-sub" id="lista-sub">Cargando...</div>
    </div>

    <div class="exp-lista" id="exp-lista">
      <!-- Skeletons -->
      <div class="skel-card">
        <div class="sk" style="width:40px;height:40px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="sk" style="height:16px;width:70%"></div>
          <div class="sk" style="height:12px;width:40%"></div>
          <div class="sk" style="height:12px;width:55%"></div>
        </div>
      </div>
      <div class="skel-card">
        <div class="sk" style="width:40px;height:40px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="sk" style="height:16px;width:60%"></div>
          <div class="sk" style="height:12px;width:35%"></div>
          <div class="sk" style="height:12px;width:50%"></div>

      <div class="skel-card">
        <div class="sk" style="width:40px;height:40px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="sk" style="height:16px;width:75%"></div>

  <!-- MAPA -->

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../navbar.js"></script>
<script>
// ══ ESTADO ══
let todasTareas = [];
let tareasFiltradas = [];
let filtroCategoria = 'todas';
let busqueda = '';
let mapa = null;
let markers = {};
let markerActivo = null;
let nuevasPendientes = [];
let ultimoTimestamp = new Date().toISOString();

const CAT_ICONS = {limpieza:'🧹',plomeria:'🔧',pintura:'🎨',electricidad:'⚡',jardin:'🌿',mudanza:'📦',carpinteria:'🔨',tecnologia:'🖥️',mandados:'🛵',generico:'📋'};
const CAT_BG = {limpieza:'#D1FAE5',plomeria:'#E0F2FE',pintura:'#FCE7F3',electricidad:'#FEF9C3',jardin:'#D1FAE5',mudanza:'#E0E7FF',carpinteria:'#FEF3C7',tecnologia:'#EFF6FF',mandados:'#FFE4E6',generico:'#F1F5F9'};

// CP a coordenadas aproximadas (para mostrar en mapa)
const CP_COORDS = {
  '1425':[-34.583,-58.428],'1414':[-34.590,-58.446],'1428':[-34.561,-58.459],
  '1641':[-34.469,-58.517],'1642':[-34.480,-58.530],'1900':[-34.921,-57.954],
  '5000':[-31.417,-64.183],'2000':[-32.946,-60.639],'5500':[-32.890,-68.845],
  '4000':[-26.808,-65.218],'3000':[-31.631,-60.700],'1050':[-34.620,-58.380],
  '1100':[-34.630,-58.370],'1300':[-34.610,-58.440],'1406':[-34.634,-58.503],
  '1440':[-34.628,-58.477],'1800':[-34.722,-58.257],'1832':[-34.764,-58.397],
  '1850':[-34.706,-58.398],'1870':[-34.660,-58.366],'7600':[-38.000,-57.550],
  '8000':[-38.717,-62.267],'8300':[-38.951,-68.059],'8400':[-41.133,-71.300],
};

// ══ INIT ══
window.addEventListener('DOMContentLoaded', async () => {
  iniciarMapa();
  await cargarTareas();
  iniciarRealtime();
  pedirUbicacion();
});

// ══ MAPA ══
function iniciarMapa() {
  mapa = L.map('mapa', { zoomControl: false }).setView([-34.603, -58.381], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © Carto',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(mapa);

  // Zoom control custom
  L.control.zoom({ position: 'bottomright' }).addTo(mapa);
}

function pedirUbicacion() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    mapa.setView([lat, lng], 13);

    // Marker de usuario
    const iconUsuario = L.divIcon({
      html: '<div style="width:16px;height:16px;background:#3B82F6;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>',
      className: '', iconSize: [16,16], iconAnchor: [8,8]
    });
    L.marker([lat, lng], { icon: iconUsuario }).addTo(mapa)
      .bindPopup('<div style="font-family:Nunito,sans-serif;font-weight:800;font-size:.82rem">📍 Tu ubicación</div>');
  }, () => {});
}

function irAMiUbicacion() {
  navigator.geolocation.getCurrentPosition(pos => {
    mapa.setView([pos.coords.latitude, pos.coords.longitude], 14);
  }, () => showToast('No se pudo obtener tu ubicación'));
}

function agregarMarker(tarea) {
  // Intentar obtener coordenadas del CP o usar aleatorio cerca de CABA
  let coords = null;
  if (tarea.cp && CP_COORDS[tarea.cp]) {
    coords = CP_COORDS[tarea.cp];
  } else {
    // Coordenada aleatoria dentro de CABA
    coords = [-34.60 + (Math.random()-0.5)*0.15, -58.38 + (Math.random()-0.5)*0.15];
  }

  const icon = CAT_ICONS[tarea.categoria] || '📋';
  const precio = tarea.presupuesto > 0 ? '$'+Number(tarea.presupuesto).toLocaleString('es-AR') : 'A convenir';

  const markerIcon = L.divIcon({
    html: `<div style="
      background:var(--verde,#00C96B);color:#fff;
      width:36px;height:36px;border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);display:flex;align-items:center;
      justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.25);
      border:2px solid #fff;cursor:pointer;
    "><span style="transform:rotate(45deg);font-size:1rem">${icon}</span></div>`,
    className: '', iconSize: [36,36], iconAnchor: [18,36], popupAnchor: [0,-38]
  });

  const marker = L.marker(coords, { icon: markerIcon }).addTo(mapa);
  marker.bindPopup(`
    <div class="mapa-popup">
      <div class="mapa-popup-titulo">${escHTML(tarea.titulo)}</div>
      <div class="mapa-popup-precio">${precio}</div>
      <a href="tarea.html?id=${tarea.id}" class="mapa-popup-btn">Ver tarea →</a>
    </div>
  `, { maxWidth: 240 });

  marker.on('click', () => resaltarCard(tarea.id));
  markers[tarea.id] = { marker, coords };
}

function resaltarCard(id) {
  // Remover resaltado anterior
  document.querySelectorAll('.exp-card').forEach(c => c.classList.remove('activa-hover'));
  const card = document.getElementById('card-' + id);
  if (card) {
    card.classList.add('activa-hover');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ══ CARGAR TAREAS ══
async function cargarTareas() {
  try {
    const { data, error } = await db
      .from('tareas')
      .select('*')
      .eq('estado', 'activa')
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) throw error;

    ultimoTimestamp = new Date().toISOString();
    todasTareas = data || [];

    // Limpiar markers existentes
    Object.values(markers).forEach(m => mapa.removeLayer(m.marker));
    markers = {};

    // Agregar markers al mapa
    todasTareas.forEach(t => agregarMarker(t));

    // Ajustar mapa si hay tareas
    if (todasTareas.length > 0 && Object.keys(markers).length > 0) {
      const grupo = L.featureGroup(Object.values(markers).map(m => m.marker));
      mapa.fitBounds(grupo.getBounds().pad(0.1));
    }

    filtrar();
  } catch(e) {
    console.error('Error cargando tareas:', e);
    // Demo
    cargarDemo();
  }
}

function cargarDemo() {
  const DEMO = [
    {id:'d1',titulo:'Limpiar departamento 2 ambientes',categoria:'limpieza',presupuesto:12000,fecha:'Esta semana',direccion:'1425 - Buenos Aires (Palermo)',estado:'activa',created_at:new Date().toISOString(),cp:'1425'},
    {id:'d2',titulo:'Arreglar canilla cocina',categoria:'plomeria',presupuesto:8000,fecha:'Hoy',direccion:'1428 - Buenos Aires (Belgrano)',estado:'activa',created_at:new Date(Date.now()-3600000).toISOString(),cp:'1428'},
    {id:'d3',titulo:'Pintar living y comedor',categoria:'pintura',presupuesto:25000,fecha:'El fin de semana',direccion:'1414 - Buenos Aires (Caballito)',estado:'activa',created_at:new Date(Date.now()-7200000).toISOString(),cp:'1414'},
    {id:'d4',titulo:'Cortar pasto jardín',categoria:'jardin',presupuesto:5000,fecha:'Soy flexible',direccion:'1641 - Acassuso (GBA Norte)',estado:'activa',created_at:new Date(Date.now()-10800000).toISOString(),cp:'1641'},
    {id:'d5',titulo:'Instalar aire acondicionado',categoria:'electricidad',presupuesto:18000,fecha:'Esta semana',direccion:'1300 - Buenos Aires (Villa Crespo)',estado:'activa',created_at:new Date(Date.now()-14400000).toISOString(),cp:'1300'},
    {id:'d6',titulo:'Mudanza monoambiente',categoria:'mudanza',presupuesto:15000,fecha:'El fin de semana',direccion:'1900 - La Plata (Buenos Aires)',estado:'activa',created_at:new Date(Date.now()-18000000).toISOString(),cp:'1900'},
  ];
  todasTareas = DEMO;
  DEMO.forEach(t => agregarMarker(t));
  filtrar();
}

// ══ FILTRAR Y RENDERIZAR ══
function filtrar() {
  const q = document.getElementById('exp-search').value.toLowerCase().trim();
  busqueda = q;

  tareasFiltradas = todasTareas.filter(t => {
    const matchCat = filtroCategoria === 'todas' || t.categoria === filtroCategoria;
    const matchQ = !q || t.titulo.toLowerCase().includes(q) || (t.descripcion||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  renderLista();
}

function setFiltroCategoria(cat, el) {
  filtroCategoria = cat;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
  el.classList.add('activo');
  filtrar();
}

function renderLista() {
  const lista = document.getElementById('exp-lista');
  const sub = document.getElementById('lista-sub');
  sub.textContent = tareasFiltradas.length + ' tarea' + (tareasFiltradas.length !== 1 ? 's' : '') + ' disponibles';

  if (!tareasFiltradas.length) {
    lista.innerHTML = `<div class="exp-empty"><div class="exp-empty-ico">🔍</div><div class="exp-empty-txt">No hay tareas con estos filtros</div></div>`;
    return;
  }

  const ahora = Date.now();
  lista.innerHTML = tareasFiltradas.map(t => {
    const icon = t.cat_icon || CAT_ICONS[t.categoria] || '📋';
    const bg = CAT_BG[t.categoria] || '#F1F5F9';
    const precio = t.presupuesto > 0 ? '$' + Number(t.presupuesto).toLocaleString('es-AR') : 'A convenir';
    const fecha = new Date(t.created_at);
    const esNueva = (ahora - fecha.getTime()) < 3600000; // < 1 hora
    const hace = tiempoRelativo(fecha);

    return `<a href="tarea.html?id=${t.id}" class="exp-card" id="card-${t.id}"
      onmouseenter="resaltarMarker('${t.id}')"
      onmouseleave="quitarResaltadoMarker('${t.id}')">
      ${esNueva ? '<div class="exp-nueva-tag">Nueva</div>' : ''}
      <div class="exp-card-top">
        <div class="exp-card-icon" style="background:${bg}">${icon}</div>
        <div class="exp-card-info">
          <div class="exp-card-titulo">${escHTML(t.titulo)}</div>
          <div class="exp-card-precio">${precio}</div>
        </div>
      </div>
      <div class="exp-card-meta">
        <div class="exp-meta-item">📅 ${escHTML(t.fecha||t.cuando||'Flexible')}</div>
        <div class="exp-meta-item">📍 ${escHTML(t.direccion||t.zona||t.cp||'—')}</div>
        <div class="exp-meta-item">🕐 ${hace}</div>
      </div>
    </a>`;
  }).join('');
}

function resaltarMarker(id) {
  if (markers[id]) {
    markers[id].marker.openPopup();
    markerActivo = id;
  }
}

function quitarResaltadoMarker(id) {
  if (markers[id]) markers[id].marker.closePopup();
}

function tiempoRelativo(fecha) {
  const diff = Date.now() - fecha.getTime();
  const mins = Math.floor(diff / 60000);
  const horas = Math.floor(diff / 3600000);
  const dias = Math.floor(diff / 86400000);
  if (mins < 2) return 'Ahora mismo';
  if (mins < 60) return `Hace ${mins} min`;
  if (horas < 24) return `Hace ${horas}h`;
  return `Hace ${dias} día${dias !== 1 ? 's' : ''}`;
}

// ══ REALTIME — nuevas tareas ══
function iniciarRealtime() {
  db.channel('explorar-tareas')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'tareas',
      filter: "estado=eq.activa"
    }, payload => {
      const nueva = payload.new;
      if (!nueva || nueva.estado !== 'activa') return;

      nuevasPendientes.push(nueva);
      mostrarBurbujaNewas();
    })
    .subscribe();
}

function mostrarBurbujaNewas() {
  const burbuja = document.getElementById('nuevas-burbuja');
  const txt = document.getElementById('nuevas-txt');
  const n = nuevasPendientes.length;
  txt.textContent = `↑ ${n} tarea${n !== 1 ? 's' : ''} nueva${n !== 1 ? 's' : ''}`;
  burbuja.classList.add('show');
}

function cargarNuevas() {
  // Agregar al inicio de la lista
  nuevasPendientes.forEach(t => {
    todasTareas.unshift(t);
    agregarMarker(t);
  });
  nuevasPendientes = [];
  document.getElementById('nuevas-burbuja').classList.remove('show');
  filtrar();
  document.getElementById('exp-lista').scrollTop = 0;
  showToast('Tareas actualizadas');
}

function escHTML(t) {
  if (!t) return '—';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}
</script>
