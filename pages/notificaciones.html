<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChambaYa — Notificaciones</title>
<link rel="stylesheet" href="../fonts.css">
<link rel="stylesheet" href="../styles.css">
<style>
.notif-wrap{max-width:760px;margin:0 auto;padding:36px 24px 80px}

/* HEADER */
.notif-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px}
.notif-titulo{font-size:1.5rem;font-weight:900;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.notif-count-badge{background:var(--rojo);color:#fff;font-size:.72rem;font-weight:900;border-radius:99px;padding:3px 9px}
.btn-mark-all{padding:9px 18px;border:1.5px solid var(--borde);border-radius:var(--radio-pill);background:var(--blanco);font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;color:var(--suave);transition:all .2s;white-space:nowrap}
.btn-mark-all:hover{border-color:var(--verde);color:var(--verde-o)}

/* TABS */
.notif-tabs{display:flex;background:var(--fondo);padding:4px;border-radius:var(--radio);margin-bottom:20px;width:fit-content;gap:2px}
.notif-tab{padding:8px 18px;border-radius:8px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;color:var(--suave);transition:all .2s;position:relative}
.notif-tab.activo{background:var(--blanco);color:var(--texto);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tab-dot{position:absolute;top:5px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--rojo);display:none}
.tab-dot.show{display:block}

/* GRUPO FECHA */
.notif-grupo-label{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:1.1px;color:var(--suave);padding:16px 2px 8px;margin-top:4px}
.notif-grupo{border-radius:var(--radio-lg);overflow:hidden;border:1.5px solid var(--borde);margin-bottom:8px;background:var(--blanco);box-shadow:0 1px 4px rgba(0,0,0,.04)}

/* ITEM */
.notif-item{
  display:flex;align-items:flex-start;gap:14px;padding:16px 18px;
  border-bottom:1px solid var(--borde);cursor:pointer;
  transition:background .15s;text-decoration:none;color:inherit;
  position:relative
}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:#F8FAFC}
.notif-item.no-leida{background:#F0FDF9}
.notif-item.no-leida:hover{background:#E8FAF3}

/* Barra lateral izquierda para no leídas */
.notif-item.no-leida::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--verde);border-radius:0}

/* Punto no leída */
.notif-punto{width:8px;height:8px;border-radius:50%;background:var(--verde);flex-shrink:0;margin-top:7px;transition:opacity .3s}
.notif-punto.leida{opacity:0}

/* Avatar */
.notif-av-wrap{position:relative;flex-shrink:0}
.notif-av{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:900;color:#fff;
  overflow:hidden;flex-shrink:0;
}
.notif-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.notif-tipo-badge{
  position:absolute;bottom:-3px;right:-3px;
  width:20px;height:20px;border-radius:50%;
  background:var(--blanco);border:2px solid var(--borde);
  display:flex;align-items:center;justify-content:center;font-size:.65rem;
  box-shadow:0 1px 4px rgba(0,0,0,.1)
}

/* Contenido */
.notif-body{flex:1;min-width:0}
.notif-actor{font-size:.88rem;font-weight:900;color:var(--texto);margin-bottom:2px}
.notif-actor a{color:var(--verde-o);text-decoration:none}
.notif-actor a:hover{text-decoration:underline}
.notif-accion{font-size:.84rem;font-weight:700;color:var(--suave);margin-bottom:5px;line-height:1.4}
/* Link a la tarea dentro de la notif */
.notif-tarea-link{display:inline-flex;align-items:center;gap:5px;background:var(--fondo);border:1.5px solid var(--borde);border-radius:var(--radio-pill);padding:4px 10px;font-size:.75rem;font-weight:900;color:var(--texto);text-decoration:none;margin-bottom:6px;transition:all .2s;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif-tarea-link:hover{border-color:var(--verde);color:var(--verde-o);background:var(--verde-c)}
.notif-preview{font-size:.8rem;font-weight:700;color:var(--suave);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.notif-tiempo{font-size:.7rem;font-weight:800;color:var(--suave);margin-top:5px}

/* Nav badge rojo — se inyecta via JS en el link del navbar */
.nav-notif-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--rojo);margin-left:4px;margin-bottom:1px;
  vertical-align:middle;animation:pulse-dot 2s infinite
}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.5}}

/* Empty */
.notif-empty{text-align:center;padding:64px 20px;background:var(--blanco);border-radius:var(--radio-lg);border:1.5px solid var(--borde)}
.notif-empty-ico{font-size:2.8rem;margin-bottom:14px;opacity:.6}
.notif-empty-titulo{font-size:.95rem;font-weight:900;margin-bottom:6px}
.notif-empty-sub{font-size:.84rem;font-weight:700;color:var(--suave)}

/* Skeleton */
.skel-grupo{border-radius:var(--radio-lg);overflow:hidden;border:1.5px solid var(--borde);margin-bottom:8px}
.skel-item{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--blanco);border-bottom:1px solid var(--borde)}
.skel-item:last-child{border-bottom:none}
.sk{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:600px){.notif-wrap{padding:20px 14px 60px}.notif-tabs{width:100%;overflow-x:auto}}
</style>
</head>
<body>
<nav class="nav">
  <a href="home.html" class="nav-logo">Chamba<em>Ya</em></a>
  <a href="publicar.html" class="nav-publicar" style="margin-left:32px">Publicar tarea</a>
  <div class="nav-links">
    <a href="explorar.html" class="nav-link">Explorar tareas</a>
    <a href="mistareas.html" class="nav-link">Mis tareas</a>
  </div>
  <div class="nav-right">
    <a href="ayuda.html" class="nav-right-link">Ayuda</a>
    <a href="notificaciones.html" class="nav-right-link activa" id="nav-notif-link">Notificaciones</a>
    <a href="mensajes.html" class="nav-right-link">Mensajes</a>
    <div class="nav-av-wrap">
      <div class="nav-av" id="nav-av" onclick="toggleDropdown(event)"><span class="nav-av-inicial" id="nav-av-inicial">?</span></div>
      <div class="nav-dropdown" id="nav-dropdown">
        <div class="dd-header"><div class="dd-nombre" id="dd-nombre">Cargando...</div><div class="dd-sub" onclick="irPerfil()">Ver perfil público</div></div>
        <a href="mistareas.html" class="dd-item">Mis tareas <span class="dd-arrow">›</span></a>
        <div class="dd-sep"></div>
        <a href="configuracion.html" class="dd-item">Configuración <span class="dd-arrow">›</span></a>
        <div class="dd-sep"></div>
        <div class="dd-item rojo" onclick="cerrarSesion()">Cerrar sesión</div>
      </div>
    </div>
  </div>
</nav>

<div class="notif-wrap">
  <div class="notif-header">
    <div class="notif-titulo">
      🔔 Notificaciones
      <span class="notif-count-badge" id="badge-count" style="display:none">0</span>
    </div>
    <button class="btn-mark-all" onclick="marcarTodasLeidas()" id="btn-mark">Marcar todas como leídas</button>
  </div>

  <div class="notif-tabs">
    <button class="notif-tab activo" onclick="setTab('todas',this)">
      Todas <span class="tab-dot" id="dot-todas"></span>
    </button>
    <button class="notif-tab" onclick="setTab('oferta',this)">
      💰 Ofertas <span class="tab-dot" id="dot-oferta"></span>
    </button>
    <button class="notif-tab" onclick="setTab('pregunta',this)">
      💬 Preguntas <span class="tab-dot" id="dot-pregunta"></span>
    </button>
    <button class="notif-tab" onclick="setTab('respuesta',this)">
      ↩️ Respuestas <span class="tab-dot" id="dot-respuesta"></span>
    </button>
  </div>

  <div id="notif-contenido">
    <!-- Skeletons iniciales -->
    <div class="skel-grupo">
      <div class="skel-item"><div class="sk" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px"><div class="sk" style="height:13px;width:65%"></div><div class="sk" style="height:11px;width:80%"></div><div class="sk" style="height:10px;width:30%"></div></div></div>
      <div class="skel-item"><div class="sk" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px"><div class="sk" style="height:13px;width:55%"></div><div class="sk" style="height:11px;width:70%"></div><div class="sk" style="height:10px;width:25%"></div></div></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../navbar.js"></script>
<script>
let miUserId = null;
let todasNotifs = [];
let tabActual = 'todas';
// Colores y config por tipo
const TIPOS = {
  oferta:          { ico:'💰', bg:'#D1FAE5', color:'#065F46', label:'hizo una oferta en tu tarea' },
  pregunta:        { ico:'💬', bg:'#EFF6FF', color:'#1E40AF', label:'preguntó en tu tarea' },
  respuesta:       { ico:'↩️', bg:'#F0FDF9', color:'#065F46', label:'respondió tu pregunta' },
  oferta_aceptada: { ico:'🎉', bg:'#FEF3C7', color:'#92400E', label:'aceptó tu oferta' },
  oferta_rechazada:{ ico:'❌', bg:'#FEF2F2', color:'#991B1B', label:'rechazó tu oferta' },
  sistema:         { ico:'📬', bg:'#F1F5F9', color:'#475569', label:'' },
};

(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.replace('login.html'); return; }
  miUserId = session.user.id;
  await cargarNotificaciones();
  iniciarRealtime();
})();

function irPerfil() { if(miUserId) window.location.href = 'perfil.html?id=' + miUserId; }

async function cargarNotificaciones() {
  try {
    const { data, error } = await db.from('notificaciones')
      .select('*').eq('user_id', miUserId)
      .order('created_at', { ascending: false }).limit(80);
    if (error) throw error;
    todasNotifs = data || [];
    actualizarBadges();
    renderNotificaciones();
  } catch(e) {
    console.error(e);
    document.getElementById('notif-contenido').innerHTML = `<div class="notif-empty"><div class="notif-empty-ico">⚠️</div><div class="notif-empty-titulo">Error al cargar</div><div class="notif-empty-sub">Intentá recargar la página</div></div>`;
  }
}

function actualizarBadges() {
  const noLeidas = todasNotifs.filter(n => !n.leida);
  const total = noLeidas.length;

  // Badge en el título de la página
  const badgeEl = document.getElementById('badge-count');
  if (total > 0) { badgeEl.textContent = total; badgeEl.style.display = 'inline'; }
  else { badgeEl.style.display = 'none'; }

  // Punto rojo en el link del navbar (esta página)
  const navLink = document.getElementById('nav-notif-link');
  if (navLink) {
    const existeDot = navLink.querySelector('.nav-notif-dot');
    if (total > 0 && !existeDot) {
      navLink.insertAdjacentHTML('beforeend', '<span class="nav-notif-dot"></span>');
    } else if (total === 0 && existeDot) {
      existeDot.remove();
    }
  }

  // Dots en las tabs por tipo
  ['oferta','pregunta','respuesta'].forEach(tipo => {
    const tieneNoLeidas = noLeidas.some(n => n.tipo === tipo || (tipo === 'oferta' && n.tipo === 'oferta_aceptada') || (tipo === 'oferta' && n.tipo === 'oferta_rechazada'));
    document.getElementById('dot-' + tipo)?.classList.toggle('show', tieneNoLeidas);
  });
  document.getElementById('dot-todas')?.classList.toggle('show', total > 0);
}

function renderNotificaciones() {
  const cont = document.getElementById('notif-contenido');
  const filtradas = tabActual === 'todas'
    ? todasNotifs
    : todasNotifs.filter(n => {
        if (tabActual === 'oferta') return ['oferta','oferta_aceptada','oferta_rechazada'].includes(n.tipo);
        return n.tipo === tabActual;
      });

  if (!filtradas.length) {
    const msgs = { todas:'Todavía no tenés notificaciones', oferta:'Sin ofertas nuevas', pregunta:'Sin preguntas nuevas', respuesta:'Sin respuestas nuevas' };
    cont.innerHTML = `<div class="notif-empty"><div class="notif-empty-ico">🔔</div><div class="notif-empty-titulo">${msgs[tabActual]||'Sin notificaciones'}</div><div class="notif-empty-sub">Cuando alguien interactúe con tus tareas, va a aparecer acá.</div></div>`;
    return;
  }

  // Agrupar por fecha
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const ayer = new Date(hoy); ayer.setDate(ayer.getDate()-1);
  const grupos = new Map();
  filtradas.forEach(n => {
    const d = new Date(n.created_at); d.setHours(0,0,0,0);
    let label;
    if (d >= hoy) label = 'Hoy';
    else if (d >= ayer) label = 'Ayer';
    else if (Date.now() - d < 7*86400000) label = d.toLocaleDateString('es-AR',{weekday:'long'});
    else label = d.toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'});
    if (!grupos.has(label)) grupos.set(label, []);
    grupos.get(label).push(n);
  });

  let html = '';
  for (const [label, items] of grupos) {
    html += `<div class="notif-grupo-label">${label}</div><div class="notif-grupo">`;
    items.forEach(n => { html += renderItem(n); });
    html += '</div>';
  }
  cont.innerHTML = html;

  // Marcar como leídas las visibles (después de un pequeño delay)
  setTimeout(() => {
    const noLeidasIds = filtradas.filter(n => !n.leida).map(n => n.id);
    if (noLeidasIds.length) marcarLeidas(noLeidasIds);
  }, 1500);
}

function renderItem(n) {
  const cfg = TIPOS[n.tipo] || TIPOS.sistema;
  const actor = n.actor_nombre || 'Un usuario';
  const ini = actor.charAt(0).toUpperCase();
  const hace = tiempoRelativo(new Date(n.created_at));
  const leida = n.leida;
  const link = n.tarea_id ? `tarea.html?id=${n.tarea_id}` : '#';

  // Texto de acción según tipo
  let accionHTML = '';
  if (n.tipo === 'oferta') {
    accionHTML = `<a href="perfil.html?id=${escH(n.actor_id||'')}" onclick="event.stopPropagation()">${escH(actor)}</a> hizo una oferta en tu tarea`;
  } else if (n.tipo === 'pregunta') {
    accionHTML = `<a href="perfil.html?id=${escH(n.actor_id||'')}" onclick="event.stopPropagation()">${escH(actor)}</a> hizo una pregunta en tu tarea`;
  } else if (n.tipo === 'respuesta') {
    accionHTML = `El propietario respondió tu pregunta`;
  } else if (n.tipo === 'oferta_aceptada') {
    accionHTML = `🎉 <strong>¡Tu oferta fue aceptada!</strong>`;
  } else if (n.tipo === 'oferta_rechazada') {
    accionHTML = `Tu oferta no fue seleccionada esta vez`;
  } else {
    accionHTML = escH(n.titulo);
  }

  // Título de la tarea como chip clickeable
  const tareaChip = n.tarea_id
    ? `<a class="notif-tarea-link" href="${link}" onclick="event.stopPropagation()">📋 ${escH(n.titulo?.replace(/^.*?(en tu tarea|tu pregunta|tu oferta)/i,'').trim() || 'Ver tarea')} →</a>`
    : '';

  // Para obtener el título real de la tarea necesitamos buscarlo — por ahora usamos el mensaje si está
  // Construimos el chip con lo que tenemos
  const tareaChipHtml = n.tarea_id
    ? `<a class="notif-tarea-link" href="${link}" onclick="marcarUnaLeida('${n.id}');event.stopPropagation()">📋 Ver tarea →</a>`
    : '';

  return `
    <a class="notif-item${leida?' ':' no-leida'}" href="${link}" onclick="marcarUnaLeida('${n.id}')">
      <div class="notif-punto${leida?' leida':''}"></div>
      <div class="notif-av-wrap">
        <div class="notif-av" style="background:${cfg.bg};color:${cfg.color}">${ini}</div>
        <div class="notif-tipo-badge">${cfg.ico}</div>
      </div>
      <div class="notif-body">
        <div class="notif-actor">${accionHTML}</div>
        ${tareaChipHtml}
        ${n.mensaje ? `<div class="notif-preview">"${escH(n.mensaje.substring(0,90))}${n.mensaje.length>90?'…':''}"</div>` : ''}
        <div class="notif-tiempo">${hace}</div>
      </div>
    </a>`;
}

function setTab(tipo, el) {
  tabActual = tipo;
  document.querySelectorAll('.notif-tab').forEach(t => t.classList.remove('activo'));
  el.classList.add('activo');
  renderNotificaciones();
}

async function marcarLeidas(ids) {
  if (!ids.length) return;
  try {
    await db.from('notificaciones').update({ leida: true }).in('id', ids);
    ids.forEach(id => { const n = todasNotifs.find(n => n.id === id); if (n) n.leida = true; });
    actualizarBadges();
    // Actualizar DOM: remover clase no-leida y apagar puntos
    ids.forEach(id => {
      document.querySelectorAll(`[onclick*="${id}"]`).forEach(el => {
        el.classList.remove('no-leida');
        el.querySelector('.notif-punto')?.classList.add('leida');
      });
    });
  } catch(e) { console.warn(e); }
}

function marcarUnaLeida(id) {
  const n = todasNotifs.find(n => n.id === id);
  if (n && !n.leida) marcarLeidas([id]);
}

async function marcarTodasLeidas() {
  const ids = todasNotifs.filter(n => !n.leida).map(n => n.id);
  if (!ids.length) { showToast('Ya están todas leídas ✓'); return; }
  await marcarLeidas(ids);
  renderNotificaciones();
  showToast('Todas marcadas como leídas ✓');
}

function iniciarRealtime() {
  db.channel('notifs-rt-' + miUserId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'notificaciones',
      filter: `user_id=eq.${miUserId}`
    }, payload => {
      if (!payload.new) return;
      todasNotifs.unshift(payload.new);
      actualizarBadges();
      renderNotificaciones();
      showToast(payload.new.titulo || 'Nueva notificación');
    })
    .subscribe();
}

function tiempoRelativo(fecha) {
  const diff = Date.now() - fecha.getTime();
  const mins = Math.floor(diff/60000);
  const horas = Math.floor(diff/3600000);
  const dias = Math.floor(diff/86400000);
  if (mins < 2) return 'Ahora mismo';
  if (mins < 60) return `Hace ${mins} min`;
  if (horas < 24) return `Hace ${horas}h`;
  if (dias === 1) return 'Ayer';
  if (dias < 7) return `Hace ${dias} días`;
  return fecha.toLocaleDateString('es-AR', {day:'numeric', month:'short'});
}

function escH(t) { if(!t)return''; const d=document.createElement('div'); d.textContent=String(t); return d.innerHTML; }
</script>
</body>
</html>
